<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verificador de Canales - Watch TV Plus</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;background:#05070b;color:#f8fafc;padding:16px}.wrap{max-width:1200px;margin:auto}header{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.brand h1{font-size:22px}.brand p{font-size:13px;color:#94a3b8;margin-top:4px}.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;margin-bottom:12px}.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.input,select,button{height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:#0d1522;color:#fff;padding:0 12px;outline:none}button{font-weight:800;cursor:pointer}.primary{background:#1d4ed8}.danger{background:#7f1d1d}.good{color:#86efac}.bad{color:#fca5a5}.wait{color:#fde68a}.muted{color:#94a3b8}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.stat{background:#0d1522;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px}.stat b{font-size:22px;display:block;margin-bottom:4px}table{width:100%;border-collapse:collapse;background:rgba(255,255,255,.03);border-radius:14px;overflow:hidden}th,td{border-bottom:1px solid rgba(255,255,255,.07);padding:10px;text-align:left;font-size:13px;vertical-align:top}th{background:#0d1522;color:#dbeafe;position:sticky;top:0}td.url{max-width:380px;word-break:break-all;color:#93c5fd}.status-pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:5px 8px;font-weight:900;font-size:11px;background:#111827}.status-ok{background:rgba(22,101,52,.35);color:#bbf7d0}.status-fail{background:rgba(127,29,29,.35);color:#fecaca}.status-pending{background:rgba(113,63,18,.35);color:#fde68a}@media(max-width:720px){.stats{grid-template-columns:1fr 1fr}table{display:block;overflow:auto}.controls>*{width:100%}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="brand"><h1>Verificador de Canales</h1><p>Revisa si cada canal abre manifest, llave y primer segmento usando tu Worker.</p></div>
  <button onclick="location.href='./index.html'">Volver al reproductor</button>
</header>

<div class="card">
  <div class="controls">
    <select id="playlistSelect"></select>
    <input class="input" id="searchInput" placeholder="Buscar canal..." />
    <button class="primary" id="loadBtn">Cargar lista</button>
    <button class="primary" id="checkVisibleBtn">Revisar visibles</button>
    <button id="stopBtn">Detener</button>
    <button id="csvBtn">Descargar CSV</button>
  </div>
</div>

<div class="stats card">
  <div class="stat"><b id="totalStat">0</b><span class="muted">Total</span></div>
  <div class="stat"><b id="okStat" class="good">0</b><span class="muted">OK</span></div>
  <div class="stat"><b id="failStat" class="bad">0</b><span class="muted">Falla</span></div>
  <div class="stat"><b id="pendingStat" class="wait">0</b><span class="muted">Pendiente</span></div>
</div>

<div class="card">
  <div id="message" class="muted">Carga una lista para comenzar.</div>
</div>

<div class="card" style="overflow:auto;max-height:70vh;padding:0">
<table>
  <thead><tr><th>Estado</th><th>Canal</th><th>Lista</th><th>URL</th><th>Mensaje</th></tr></thead>
  <tbody id="tbody"></tbody>
</table>
</div>
</div>

<script>
const WORKER = "https://hls-proxy-tv-plus.mikimc-business.workers.dev";
const PLAYLISTS = [
  { id:"mexico", label:"México", file:"./mexico.m3u", isAdult:false },
  { id:"pluto", label:"Pluto TV", file:"./pluto.m3u", isAdult:false },
  { id:"espanol", label:"Español", file:"./espanol.m3u", isAdult:false },
  { id:"ingles", label:"Inglés", file:"./ingles.m3u", isAdult:false },
  { id:"mundial", label:"Mundial", file:"./mundial.m3u", isAdult:false },
  { id:"adult", label:"Adultos 18+", file:"./adult.m3u", isAdult:true }
];

const playlistSelect = document.getElementById("playlistSelect");
const searchInput = document.getElementById("searchInput");
const loadBtn = document.getElementById("loadBtn");
const checkVisibleBtn = document.getElementById("checkVisibleBtn");
const stopBtn = document.getElementById("stopBtn");
const csvBtn = document.getElementById("csvBtn");
const tbody = document.getElementById("tbody");
const message = document.getElementById("message");
const totalStat = document.getElementById("totalStat");
const okStat = document.getElementById("okStat");
const failStat = document.getElementById("failStat");
const pendingStat = document.getElementById("pendingStat");
let channels = [];
let stop = false;

function init(){
  PLAYLISTS.forEach(pl => {
    const opt = document.createElement("option");
    opt.value = pl.id;
    opt.textContent = pl.label;
    playlistSelect.appendChild(opt);
  });
  loadBtn.addEventListener("click", loadSelected);
  checkVisibleBtn.addEventListener("click", checkVisible);
  stopBtn.addEventListener("click", () => { stop = true; message.textContent = "Verificación detenida."; });
  csvBtn.addEventListener("click", downloadCSV);
  searchInput.addEventListener("input", render);
  loadSelected();
}

async function loadSelected(){
  const pl = PLAYLISTS.find(p => p.id === playlistSelect.value) || PLAYLISTS[0];
  message.textContent = "Cargando " + pl.label + "...";
  tbody.innerHTML = "";
  const res = await fetch(pl.file + "?v=" + Date.now(), {cache:"no-store"});
  const text = await res.text();
  channels = parseM3U(text).map((ch, i) => ({...ch, index:i+1, playlist:pl.label, status:"pendiente", message:"", checked:false}));
  message.textContent = `Lista cargada: ${pl.label}. ${channels.length} canales.`;
  render();
}

function parseM3U(text){
  const lines = String(text || "").replace(/\r/g, "").split("\n");
  const list=[]; let current=null; let ref=""; let ua="";
  for(const raw of lines){
    const line = raw.trim(); if(!line) continue;
    if(line.startsWith("#EXTVLCOPT:http-referrer=")){ ref = line.replace("#EXTVLCOPT:http-referrer=", "").trim(); if(current) current.referrer = ref; continue; }
    if(line.startsWith("#EXTVLCOPT:http-user-agent=")){ ua = line.replace("#EXTVLCOPT:http-user-agent=", "").trim(); if(current) current.userAgent = ua; continue; }
    if(line.startsWith("#EXTINF")){
      const rawName = line.includes(",") ? line.substring(line.indexOf(",") + 1).trim() : "Canal sin nombre";
      current = { name:cleanName(rawName), rawName, url:"", referrer:ref, userAgent:ua };
      continue;
    }
    if(current && (line.startsWith("http://") || line.startsWith("https://"))){
      current.url=line; list.push(current); current=null; ref=""; ua="";
    }
  }
  const seen = new Set();
  return list.filter(ch => { if(seen.has(ch.url)) return false; seen.add(ch.url); return true; });
}
function cleanName(raw){ return String(raw).replace(/\s*\[[^\]]+\]/g, "").replace(/\s*\([^)]*(?:p|HD|SD|4K)[^)]*\)/ig, "").trim() || raw; }
function getVisible(){ const s = searchInput.value.trim().toLowerCase(); return channels.filter(ch => !s || (ch.name + " " + ch.rawName + " " + ch.url).toLowerCase().includes(s)); }
function render(){
  const visible = getVisible();
  tbody.innerHTML = "";
  const frag = document.createDocumentFragment();
  visible.slice(0,1200).forEach(ch => {
    const tr = document.createElement("tr");
    const cls = ch.status === "ok" ? "status-ok" : ch.status === "falla" ? "status-fail" : "status-pending";
    tr.innerHTML = `<td><span class="status-pill ${cls}">${ch.status.toUpperCase()}</span></td><td>${escapeHtml(ch.name)}</td><td>${escapeHtml(ch.playlist)}</td><td class="url">${escapeHtml(ch.url)}</td><td>${escapeHtml(ch.message || "")}</td>`;
    frag.appendChild(tr);
  });
  tbody.appendChild(frag);
  if(visible.length > 1200){
    const tr = document.createElement("tr");
    tr.innerHTML = `<td colspan="5" class="muted">Mostrando 1200 de ${visible.length}. Usa el buscador para filtrar.</td>`;
    tbody.appendChild(tr);
  }
  updateStats();
}
function updateStats(){
  totalStat.textContent = channels.length;
  okStat.textContent = channels.filter(c=>c.status==="ok").length;
  failStat.textContent = channels.filter(c=>c.status==="falla").length;
  pendingStat.textContent = channels.filter(c=>c.status==="pendiente").length;
}
async function checkVisible(){
  stop = false;
  const visible = getVisible();
  message.textContent = `Revisando ${visible.length} canales visibles...`;
  for(let i=0;i<visible.length;i++){
    if(stop) break;
    const ch = visible[i];
    ch.status = "pendiente"; ch.message = "Revisando..."; render();
    try{
      const url = new URL(WORKER + "/check");
      url.searchParams.set("url", ch.url);
      if(ch.referrer) url.searchParams.set("ref", ch.referrer);
      if(ch.userAgent) url.searchParams.set("ua", ch.userAgent);
      const res = await fetch(url.toString(), {cache:"no-store"});
      const data = await res.json();
      ch.status = data.ok ? "ok" : "falla";
      ch.message = data.message || data.stage || "Sin mensaje";
    }catch(e){
      ch.status = "falla";
      ch.message = e.message;
    }
    message.textContent = `Revisando ${i+1}/${visible.length}: ${ch.name}`;
  }
  render();
  message.textContent = stop ? "Verificación detenida." : "Verificación terminada.";
}
function downloadCSV(){
  const rows = [["estado","canal","lista","url","mensaje"]].concat(channels.map(ch => [ch.status,ch.name,ch.playlist,ch.url,ch.message]));
  const csv = rows.map(r => r.map(v => '"' + String(v || "").replaceAll('"','""') + '"').join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "canales-revisados.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}
function escapeHtml(text){ return String(text || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
init();
</script>
</body>
</html>
